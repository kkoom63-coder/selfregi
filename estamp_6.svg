<rect x="0" y="0" width="760" height="560" fill="#e8ecf4"/><rect x="24" y="26" width="720" height="520" fill="#00000018"/><rect x="20" y="20" width="720" height="520" fill="#fff" stroke="#c5ccd8"/><rect x="40" y="34" width="252" height="30" rx="3" fill="#d8dde8"/><text x="166.0" y="54" text-anchor="middle" font-size="9" fill="#888">1  납부정보입력</text><text x="301" y="53" font-size="11" fill="#9aa3b4">&#9654;</text><rect x="300" y="34" width="220" height="30" rx="3" fill="url(#step2Grad)"/><text x="410.0" y="54" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff">2  입력정보확인</text><text x="529" y="53" font-size="11" fill="#9aa3b4">&#9654;</text><rect x="528" y="34" width="232" height="30" rx="3" fill="#d8dde8"/><text x="644.0" y="54" text-anchor="middle" font-size="9" fill="#888">3  구매결과확인 및 발급</text><rect x="28" y="94" width="704" height="30" fill="#fff" stroke="#dde1eb"/><text x="40" y="114" font-size="9" font-weight="700" fill="#333">총 건수</text><text x="110" y="114" font-size="9" fill="#333">1 건</text><text x="240" y="114" font-size="9" font-weight="700" fill="#333">총 금액</text><text x="310" y="114" font-size="9" fill="#333">150,000 원</text><rect x="28" y="134" width="704" height="28" fill="#fff" stroke="#dde1eb"/><text x="40" y="153" font-size="9" font-weight="700" fill="#333">결제수단</text><circle cx="160" cy="148" r="6" fill="#fff" stroke="#1d6fd0" stroke-width="1.5"/><circle cx="160" cy="148" r="3" fill="#1d6fd0"/><text x="172" y="152" font-size="9" font-weight="700" fill="#1d6fd0">계좌이체</text><circle cx="260" cy="148" r="6" fill="#fff" stroke="#9aa3b4" stroke-width="1.5"/><text x="272" y="152" font-size="9" fill="#999">신용카드</text><text x="36" y="178" font-size="9" fill="#e07020">등록된 계좌가 없거나, 고객이 등록하신 금융기관 계좌는 납부가능한 시간이 아닙니다.</text><text x="36" y="191" font-size="8" fill="#999">(현재 시간에 납부가능한 금융기관의 계좌를 등록한 후 납부하실 수 있습니다.)</text><text x="36" y="208" font-size="10" font-weight="700" fill="#333">등록된 계좌</text><rect x="588" y="193" width="132" height="22" rx="3" fill="url(#btnBlue)"/><text x="654.0" y="208.0" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">새 계좌 등록하기 ›</text><rect x="28" y="222" width="200" height="26" fill="#f3f5f9" stroke="#dde1eb"/><text x="40" y="239" font-size="8.6" font-weight="600" fill="#444">통신상태</text><rect x="228" y="222" width="504" height="26" fill="#fff" stroke="#dde1eb"/><rect x="28" y="249" width="200" height="26" fill="#f3f5f9" stroke="#dde1eb"/><text x="40" y="266" font-size="8.6" font-weight="600" fill="#444">관리명</text><rect x="228" y="249" width="504" height="26" fill="#fff" stroke="#dde1eb"/><rect x="28" y="276" width="200" height="26" fill="#f3f5f9" stroke="#dde1eb"/><text x="40" y="293" font-size="8.6" font-weight="600" fill="#444">납부계좌번호</text><rect x="228" y="276" width="240" height="26" fill="#fff" stroke="#a8afc0" stroke-width="1"/><text x="234" y="293" font-size="8.6" fill="#999">계좌 선택</text><line x1="440" y1="278" x2="440" y2="300" stroke="#d0d4de"/><rect x="440" y="277" width="27" height="24" fill="#f2f3f6"/><path d="M449.5,287 L458.5,287 L454,292 Z" fill="#5a6172"/><rect x="28" y="303" width="200" height="26" fill="#f3f5f9" stroke="#dde1eb"/><text x="40" y="320" font-size="8.6" font-weight="600" fill="#444">계좌비밀번호</text><rect x="228" y="303" width="504" height="26" fill="#fff" stroke="#dde1eb"/><text x="240" y="320" font-size="8.6" fill="#333">●●●●</text><rect x="28" y="222" width="704" height="108" rx="3" fill="none" stroke="#e0392b" stroke-width="2" stroke-dasharray="5 3"/><circle cx="28" cy="222" r="11" fill="#e0392b"/><text x="28" y="226" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">1</text><text x="36" y="350" font-size="10" font-weight="700" fill="#333">구매자 정보</text><rect x="28" y="366" width="704" height="26" fill="#fff" stroke="#dde1eb"/><text x="40" y="383" font-size="8.6" fill="#444">구매자 성명(상호)</text><rect x="170" y="369" width="220" height="20" rx="2" fill="#fff" stroke="#c0c8d8"/><text x="410" y="383" font-size="8.6" fill="#444">구매자 주민(사업자)등록번호</text><rect x="590" y="369" width="130" height="20" rx="2" fill="#fff" stroke="#c0c8d8"/><rect x="28" y="393" width="704" height="26" fill="#fff" stroke="#dde1eb"/><text x="40" y="410" font-size="8.6" fill="#444">구매자 연락처</text><rect x="170" y="396" width="220" height="20" rx="2" fill="#fff" stroke="#c0c8d8"/><rect x="28" y="366" width="704" height="54" rx="3" fill="none" stroke="#e0392b" stroke-width="2" stroke-dasharray="5 3"/><circle cx="28" cy="366" r="11" fill="#e0392b"/><text x="28" y="370" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">2</text><text x="36" y="437" font-size="8.3" fill="#2aa060" text-decoration="underline">구매자(결제자) 본인명의의 계좌만 이용 가능합니다.</text><rect x="306.0" y="457" width="62" height="28" rx="3" fill="url(#btnBlue)"/><text x="337.0" y="475.0" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">납부</text><rect x="386.0" y="457" width="62" height="28" rx="3" fill="#fff" stroke="#9aa3b4"/><text x="417.0" y="475" text-anchor="middle" font-size="10" fill="#666">취소</text><rect x="302.0" y="455" width="148" height="32" rx="3" fill="none" stroke="#e0392b" stroke-width="2" stroke-dasharray="5 3"/><circle cx="302.0" cy="455" r="11" fill="#e0392b"/><text x="302.0" y="459" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">3</text><text x="380.0" y="550" text-anchor="middle" font-size="8" fill="#c0c5d0">(이해를 돕기 위한 재현 이미지)</text></svg>