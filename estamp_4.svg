<rect x="106" y="326" width="140" height="22" rx="2" fill="#f5f8ff" stroke="#b0bcd4"/><text x="114" y="340" font-size="8.5" fill="#555">은행 선택</text><text x="232" y="341" font-size="8" fill="#666">▼</text>
