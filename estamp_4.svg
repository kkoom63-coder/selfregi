<rect x="22" y="212" width="120" height="28" fill="#f3f5f9" stroke="#dde1eb"/><text x="32" y="229" font-size="8.8" font-weight="600" fill="#444">총 건수</text><rect x="142" y="212" width="616" height="28" fill="#fff" stroke="#dde1eb"/><text x="152" y="229" font-size="8.8" fill="#333">1 건</text>
<text x="402" y="229" font-size="8.8" font-weight="600" fill="#444">총 금액</text>
<text x="472" y="229" font-size="8.8" fill="#333">150,000 원</text>
<rect x="22" y="240" width="120" height="28" fill="#f3f5f9" stroke="#dde1eb"/><text x="32" y="257" font-size="8.8" font-weight="600" fill="#444">결제수단</text><rect x="142" y="240" width="616" height="28" fill="#fff" stroke="#dde1eb"/><text x="152" y="257" font-size="8.8" fill="#333"></text>
<circle cx="160" cy="254" r="6" fill="#fff" stroke="#1d6fd0" stroke-width="1.5"/><circle cx="160" cy="254" r="3" fill="#1d6fd0"/><text x="172" y="258" font-size="9" fill="#333">계좌이체</text>
<circle cx="225" cy="254" r="6" fill="#fff" stroke="#9aa3b4" stroke-width="1.5"/><text x="237" y="258" font-size="9" fill="#333">신용카드</text>
<rect x="147" y="242" width="150" height="24" rx="3" fill="none" stroke="#e0392b" stroke-width="2" stroke-dasharray="5 3"/><circle cx="147" cy="242" r="11" fill="#e0392b"/><text x="147" y="246" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">1</text>
<text x="22" y="284" font-size="11" font-weight="700" fill="#333">납무계좌 선택</text>
