<text x="22" y="364" font-size="8.5" fill="#2aa060" text-decoration="underline">구매자(결제자) 본인명의의 계좌만 이용 가능합니다.</text>
<text x="22" y="386" font-size="11" font-weight="700" fill="#333">구매자 정보</text>
