<rect x="0" y="0" width="780" height="520" fill="#e8ecf4"/>
<rect x="10" y="10" width="760" height="500" fill="#fff"/>
<rect x="10" y="10" width="760" height="38" rx="4" fill="#f0f2f7"/><rect x="14" y="14" width="250" height="30" rx="3" fill="#d8dde8"/><text x="139" y="34" text-anchor="middle" font-size="9" fill="#888">1  납부정보입력</text><text x="265" y="33" font-size="11" fill="#9aa3b4">&#9654;</text><rect x="264" y="14" width="250" height="30" rx="3" fill="url(#step2Grad)"/><text x="389" y="34" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff">2  입력정보확인</text><text x="515" y="33" font-size="11" fill="#9aa3b4">&#9654;</text><rect x="515" y="14" width="250" height="30" rx="3" fill="#d8dde8"/><text x="640" y="34" text-anchor="middle" font-size="9" fill="#888">3  구매결과확인 및 발급</text>
<text x="22" y="72" font-size="10.5" font-weight="700" fill="#1a3a6a">인지세 과세문서 및 세액을 알려드립니다.</text>
<text x="758" y="72" text-anchor="end" font-size="8.5" fill="#1d6fd0">인지세 과세문서 안내</text>
<text x="22" y="88" font-size="8" fill="#e0392b">전자수입인지는 구매 후 취소가 허용되지 않습니다.</text>
<text x="22" y="102" font-size="8" fill="#e0392b">계좌이체 일괄(다건) 구매는 최대 10건까지 가능합니다. 다만 SC은행 계좌의 경우 최대 5건까지 가능합니다.</text>
<text x="22" y="116" font-size="8" fill="#e0392b">신용카드 일괄(다건) 구매는 최대 20건까지 가능합니다.</text>
<text x="22" y="130" font-size="8" fill="#e0392b">전자수입인지는 구매 후 취소가 허용되지 않습니다.</text>
<text x="22" y="144" font-size="8" fill="#e0392b">구매 후 사용하지 아니한 전자수입인지는 우체국, 금융회사(은행 등)를 통해 환매가 가능합니다(환매수수료: 구매금액의 3% 이내).</text>
<text x="22" y="158" font-size="8" fill="#e0392b">전자수입인지는 건당 구매하여 서류에 첨부하여야 하니 주의하시기 바랍니다.</text>
<text x="22" y="178" font-size="9" fill="#333">최종 결제전 프린터 출력 가능 여부를 확인하시기 바랍니다.</text>
<rect x="668" y="166" width="90" height="22" rx="3" fill="#7a8595"/><text x="713" y="181" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">테스트출력</text>
<text x="22" y="198" font-size="11" font-weight="700" fill="#333">납부정보</text>
