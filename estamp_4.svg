<rect x="320" y="502" width="60" height="26" rx="3" fill="url(#btnBlue)"/><text x="350" y="519" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">납무</text>
<rect x="400" y="502" width="60" height="26" rx="3" fill="#fff" stroke="#9aa3b4"/><text x="430" y="519" text-anchor="middle" font-size="11" font-weight="700" fill="#444">취소</text>
<rect x="318" y="500" width="64" height="30" rx="3" fill="none" stroke="#e0392b" stroke-width="2" stroke-dasharray="5 3"/><circle cx="318" cy="500" r="11" fill="#e0392b"/><text x="318" y="504" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">3</text>
<text x="390" y="512" text-anchor="middle" font-size="8" fill="#c0c5d0">(이해를 돕기 위한 재현 이미지)</text>
