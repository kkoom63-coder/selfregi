<text x="208" y="299" font-size="8.6" fill="#8a6420">취득자의 세대별 주민등록표상 세대원을 모두 기재합니다(동거인 제외).</text>
<text x="208" y="316" font-size="8.6" fill="#8a6420">주소를 달리하는 배우자·30세 미만 미혼 자녀가 있으면 함께 입력합니다.</text>
<text x="208" y="333" font-size="8.6" fill="#8a6420">취득자가 30세 미만·미혼이면 주민등록을 달리하는 부모도 입력합니다.</text>
<text x="208" y="350" font-size="8.6" fill="#8a6420">조회되지 않는 세대원은 직접 추가하고, 주민등록등본·가족관계증명서를 구비서류로 제출합니다.</text>
