<rect x="0" y="0" width="760" height="460" fill="#e8ecf4"/><rect x="24" y="26" width="720" height="420" fill="#00000018"/><rect x="20" y="20" width="720" height="420" fill="#fff" stroke="#c5ccd8"/><rect x="40" y="34" width="252" height="30" rx="3" fill="#d8dde8"/><text x="166.0" y="54" text-anchor="middle" font-size="9" fill="#888">1  납부정보입력</text><text x="301" y="53" font-size="11" fill="#9aa3b4">&#9654;</text><rect x="300" y="34" width="220" height="30" rx="3" fill="url(#step2Grad)"/><text x="410.0" y="54" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff">2  입력정보확인</text><text x="529" y="53" font-size="11" fill="#9aa3b4">&#9654;</text><rect x="528" y="34" width="232" height="30" rx="3" fill="#d8dde8"/><text x="644.0" y="54" text-anchor="middle" font-size="9" fill="#888">3  구매결과확인 및 발급</text><text x="36" y="90" font-size="10.5" font-weight="700" fill="#1a3a6a">인지세 과세문서 및 세액을 알려드립니다.</text><text x="724" y="90" text-anchor="end" font-size="8.3" fill="#1d6fd0" text-decoration="underline">인지세 과세문서 안내</text><text x="36" y="108" font-size="7.6" fill="#e0392b">· 계좌이체 일괄(다건) 구매는 최대 10건까지 가능합니다. 다만 SC은행 계좌의 경우 최대 5건까지 가능합니다.</text><text x="36" y="121" font-size="7.6" fill="#e0392b">· 신용카드 일괄(다건) 구매는 최대 20건까지 가능합니다.</text><text x="36" y="134" font-size="7.6" fill="#e0392b">· 전자수입인지는 구매 후 취소가 허용되지 않습니다.</text><text x="36" y="147" font-size="7.6" fill="#e0392b">· 구매 후 사용하지 아니한 전자수입인지는 우체국, 금융회사(은행 등)를 통해 환매가 가능합니다.(환매수수료 등 자세한 사항은 '서비스안내 → 이용방법 안내' 참조)</text><text x="36" y="160" font-size="7.6" fill="#e0392b">· 전자수입인지는 건당 구매하여 서류에 첨부하여야 하니 주의하시기 바랍니다.</text><text x="36" y="173" font-size="7.6" fill="#e0392b">· 전자수입인지 구매 및 환매 내역은 기획재정부에 통보됩니다.</text><text x="36" y="198" font-size="9" fill="#333">최종 결제전 프린터 출력 가능 여부를 확인하시기 바랍니다.</text><rect x="634" y="182" width="90" height="22" rx="3" fill="url(#btnBlue)"/><text x="679.0" y="197.0" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">테스트출력</text><rect x="632" y="180" width="94" height="26" rx="3" fill="none" stroke="#e0392b" stroke-width="2" stroke-dasharray="5 3"/><circle cx="632" cy="180" r="11" fill="#e0392b"/><text x="632" y="184" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">1</text><rect x="28" y="220" width="704" height="26" fill="#f0f3fa" stroke="#dde1eb"/><text x="40" y="237" font-size="9" font-weight="700" fill="#333">총 건수</text><text x="100" y="237" font-size="9" fill="#333">1 건</text><text x="248" y="237" font-size="9" font-weight="700" fill="#333">총 금액</text><text x="318" y="237" font-size="9" fill="#333">150,000 원</text><rect x="28" y="260" width="704" height="30" fill="#fff" stroke="#dde1eb"/><text x="40" y="280" font-size="9" font-weight="700" fill="#333">결제수단</text><circle cx="160" cy="275" r="6" fill="#fff" stroke="#9aa3b4" stroke-width="1.5"/><text x="172" y="279" font-size="9" fill="#333">계좌이체</text><circle cx="260" cy="275" r="6" fill="#fff" stroke="#9aa3b4" stroke-width="1.5"/><text x="272" y="279" font-size="9" fill="#333">신용카드</text><rect x="148" y="263" width="220" height="24" rx="3" fill="none" stroke="#e0392b" stroke-width="2" stroke-dasharray="5 3"/><circle cx="148" cy="263" r="11" fill="#e0392b"/><text x="148" y="267" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">2</text><text x="380.0" y="450" text-anchor="middle" font-size="8" fill="#c0c5d0">(이해를 돕기 위한 재현 이미지)</text></svg>