<svg viewBox="0 0 760 792" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif"><rect x="1" y="1" width="758" height="790" rx="10" fill="#ffffff" stroke="#d7dee7" stroke-width="1.5"/><text x="36" y="38" font-size="19" font-weight="800" fill="#1e3a5f">가족관계등록부 열람/발급 신청</text><rect x="36" y="64" width="688" height="34" rx="5" fill="#4a4f57"/><text x="50" y="86" font-size="16" font-weight="700" fill="#ffffff">1. 발급 대상자를 선택해 주세요.</text><circle cx="51" cy="119" r="9" fill="#2a5f9e" stroke="#2a5f9e" stroke-width="1.5"/><path d="M 46.8 119.3 L 49.8 122.4 L 55.6 115.2" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><text x="68" y="124" font-size="15" fill="#222">본인</text><circle cx="136.4" cy="119" r="9" fill="#fff" stroke="#9aa4b2" stroke-width="1.5"/><text x="153.4" y="124" font-size="15" fill="#222">가족</text><rect x="35" y="103" width="68.4" height="33" rx="6" fill="none" stroke="#e53935" stroke-width="2.5" stroke-dasharray="6 4"/><rect x="36" y="154" width="688" height="34" rx="5" fill="#4a4f57"/><text x="50" y="176" font-size="16" font-weight="700" fill="#ffffff">2. 증명서 종류를 선택해 주세요.</text><circle cx="51" cy="209" r="9" fill="#2a5f9e" stroke="#2a5f9e" stroke-width="1.5"/><path d="M 46.8 209.3 L 49.8 212.4 L 55.6 205.2" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><text x="68" y="214" font-size="15" fill="#222">가족관계증명서</text><circle cx="209.89999999999998" cy="209" r="9" fill="#fff" stroke="#9aa4b2" stroke-width="1.5"/><text x="226.89999999999998" y="214" font-size="15" fill="#222">기본증명서</text><circle cx="339.4" cy="209" r="9" fill="#fff" stroke="#9aa4b2" stroke-width="1.5"/><text x="356.4" y="214" font-size="15" fill="#222">혼인관계증명서</text><circle cx="498.29999999999995" cy="209" r="9" fill="#fff" stroke="#9aa4b2" stroke-width="1.5"/><text x="515.3" y="214" font-size="15" fill="#222">입양관계증명서</text><circle cx="51" cy="249" r="9" fill="#fff" stroke="#9aa4b2" stroke-width="1.5"/><text x="68" y="254" font-size="15" fill="#222">친양자입양관계증명서</text><rect x="35" y="193" width="141.89999999999998" height="33" rx="6" fill="none" stroke="#e53935" stroke-width="2.5" stroke-dasharray="6 4"/><rect x="36" y="284" width="688" height="34" rx="5" fill="#4a4f57"/><text x="50" y="306" font-size="16" font-weight="700" fill="#ffffff">3. 일반증명서 · 상세증명서 · 특정증명서 중 선택해 주세요.</text><circle cx="51" cy="339" r="9" fill="#fff" stroke="#9aa4b2" stroke-width="1.5"/><text x="68" y="344" font-size="15" fill="#222">일반증명서</text><circle cx="180.5" cy="339" r="9" fill="#2a5f9e" stroke="#2a5f9e" stroke-width="1.5"/><path d="M 176.3 339.3 L 179.3 342.4 L 185.1 335.2" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><text x="197.5" y="344" font-size="15" fill="#222">상세증명서</text><circle cx="310.0" cy="339" r="9" fill="#fff" stroke="#9aa4b2" stroke-width="1.5"/><text x="327.0" y="344" font-size="15" fill="#222">특정증명서</text><rect x="164.5" y="323" width="112.5" height="33" rx="6" fill="none" stroke="#e53935" stroke-width="2.5" stroke-dasharray="6 4"/><text x="42" y="372" font-size="13" fill="#8a94a2">본인·부모·배우자와 모든 자녀(사망·혼인한 자녀 포함)가 표시됩니다.</text><rect x="36" y="394" width="688" height="34" rx="5" fill="#4a4f57"/><text x="50" y="416" font-size="16" font-weight="700" fill="#ffffff">4. 주민등록번호(뒷부분 6자리) 공개 여부를 선택해 주세요.</text><circle cx="51" cy="449" r="9" fill="#fff" stroke="#9aa4b2" stroke-width="1.5"/><text x="68" y="454" font-size="15" fill="#222">전부 비공개</text><circle cx="186.8" cy="449" r="9" fill="#2a5f9e" stroke="#2a5f9e" stroke-width="1.5"/><path d="M 182.60000000000002 449.3 L 185.60000000000002 452.4 L 191.4 445.2" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><text x="203.8" y="454" font-size="15" fill="#222">전부 공개</text><circle cx="307.9" cy="449" r="9" fill="#fff" stroke="#9aa4b2" stroke-width="1.5"/><text x="324.9" y="454" font-size="15" fill="#222">신청대상자 본인만 공개</text><rect x="170.8" y="433" width="104.09999999999997" height="33" rx="6" fill="none" stroke="#e53935" stroke-width="2.5" stroke-dasharray="6 4"/><rect x="36" y="484" width="688" height="34" rx="5" fill="#4a4f57"/><text x="50" y="506" font-size="16" font-weight="700" fill="#ffffff">5. 수령방법을 선택해 주세요.</text><circle cx="51" cy="539" r="9" fill="#2a5f9e" stroke="#2a5f9e" stroke-width="1.5"/><path d="M 46.8 539.3 L 49.8 542.4 L 55.6 535.2" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><text x="68" y="544" font-size="15" fill="#222">직접 인쇄</text><circle cx="172.1" cy="539" r="9" fill="#fff" stroke="#9aa4b2" stroke-width="1.5"/><text x="189.1" y="544" font-size="15" fill="#222">전자문서지갑</text><circle cx="316.29999999999995" cy="539" r="9" fill="#fff" stroke="#9aa4b2" stroke-width="1.5"/><text x="333.29999999999995" y="544" font-size="15" fill="#222">화면 열람</text><rect x="35" y="523" width="104.1" height="33" rx="6" fill="none" stroke="#e53935" stroke-width="2.5" stroke-dasharray="6 4"/><text x="42" y="572" font-size="13" fill="#8a94a2">증명서를 프린터로 직접 인쇄합니다.</text><rect x="36" y="594" width="688" height="34" rx="5" fill="#4a4f57"/><text x="50" y="616" font-size="16" font-weight="700" fill="#ffffff">6. 신청사유를 선택해 주세요.</text><circle cx="51" cy="649" r="9" fill="#2a5f9e" stroke="#2a5f9e" stroke-width="1.5"/><path d="M 46.8 649.3 L 49.8 652.4 L 55.6 645.2" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><text x="68" y="654" font-size="15" fill="#222">개인 신분 또는 가족관계증명</text><circle cx="302.29999999999995" cy="649" r="9" fill="#fff" stroke="#9aa4b2" stroke-width="1.5"/><text x="319.29999999999995" y="654" font-size="15" fill="#222">국내 기관 제출</text><circle cx="459.09999999999997" cy="649" r="9" fill="#fff" stroke="#9aa4b2" stroke-width="1.5"/><text x="476.09999999999997" y="654" font-size="15" fill="#222">연말정산</text><circle cx="573.9" cy="649" r="9" fill="#fff" stroke="#9aa4b2" stroke-width="1.5"/><text x="590.9" y="654" font-size="15" fill="#222">해외 제출</text><circle cx="51" cy="689" r="9" fill="#fff" stroke="#9aa4b2" stroke-width="1.5"/><text x="68" y="694" font-size="15" fill="#222">본인 확인 등 기타</text><rect x="35" y="633" width="234.29999999999995" height="33" rx="6" fill="none" stroke="#e53935" stroke-width="2.5" stroke-dasharray="6 4"/><rect x="36" y="732" width="120" height="40" rx="5" fill="#5b6472"/><text x="96.0" y="758" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">신청하기</text><rect x="30" y="726" width="132" height="52" rx="7" fill="none" stroke="#e53935" stroke-width="2.5" stroke-dasharray="6 4"/><rect x="176" y="732" width="220" height="40" rx="5" fill="#2f8f7f"/><text x="286.0" y="758" font-size="14" fill="#fff" text-anchor="middle">발급이력 및 아포스티유 전송</text></svg>