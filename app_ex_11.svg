<text x="380" y="52" font-size="15" font-weight="700" fill="#0F172A" text-anchor="middle" letter-spacing="6">소유권이전등기신청(매매)</text>
<text x="52" y="82" font-size="12.5" font-weight="700" fill="#334155">11. 신청인 및 제출 법원</text>
<line x1="52" y1="90" x2="708" y2="90" stroke="#94A3B8"/><text x="380" y="124" font-size="12.5" fill="#0F172A" font-weight="400" text-anchor="middle">2026년  ○월  ○일</text><text x="64" y="160" font-size="11.5" fill="#64748B" font-weight="700" text-anchor="start">위 신청인</text><text x="120" y="186" font-size="12" fill="#0F172A" font-weight="400" text-anchor="start">이대백  (인)   010-0000-0000    ← 매도인: 인감도장 날인</text><text x="120" y="212" font-size="12" fill="#0F172A" font-weight="400" text-anchor="start">김갑동  (인)   010-0000-0000    ← 매수인: 도장 날인 또는 서명</text><rect x="108" y="168" width="470" height="54" fill="none" stroke="#DC2626" stroke-width="2.5" stroke-dasharray="7 4" rx="6"/><circle cx="108" cy="168" r="11" fill="#DC2626"/><text x="108" y="172" font-size="11" font-weight="800" fill="#fff" text-anchor="middle">1</text><text x="380" y="268" font-size="14" fill="#0F172A" font-weight="700" text-anchor="middle">서울중앙지방법원 등기국  귀중</text><rect x="230" y="248" width="300" height="30" fill="none" stroke="#DC2626" stroke-width="2.5" stroke-dasharray="7 4" rx="6"/><circle cx="230" cy="248" r="11" fill="#DC2626"/><text x="230" y="252" font-size="11" font-weight="800" fill="#fff" text-anchor="middle">2</text><text x="64" y="316" font-size="11" font-weight="700" fill="#DC2626" text-anchor="start">① 매도인은 인감증명서의 인감도장으로 날인 (본인서명사실확인서 제출 시 서명 가능)</text><text x="64" y="334" font-size="11" font-weight="700" fill="#DC2626" text-anchor="start">② 관할 등기소명 — 로드맵 상단에서 확인한 관할청을 적고 '귀중'으로 마무리</text><text x="64" y="356" font-size="11" fill="#64748B" font-weight="400" text-anchor="start">※ 신청서가 여러 장이면 장 사이에 간인(또는 각 장 서명)을 합니다</text><rect x="0" y="422" width="760" height="38" fill="#E2E8F0"/>
<text x="380" y="445" font-size="10.5" fill="#475569" text-anchor="middle">재현 이미지 — 실제 대법원 서식과 배치가 다를 수 있으며, 기재 내용은 예시입니다 · 날짜·연락처는 예시</text>
