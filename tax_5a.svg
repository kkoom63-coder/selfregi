<svg viewBox="0 0 700 560" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Noto Sans KR',sans-serif">
  <defs>
    <linearGradient id="btnBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d83dd"/><stop offset="1" stop-color="#2a6fc9"/>
    </linearGradient>
  </defs>

  <!-- 배경(딤드) -->
  <rect x="0" y="0" width="700" height="560" fill="#e7e9ee"/>

  <!-- 모달 카드 -->
  <rect x="20" y="20" width="660" height="520" rx="6" fill="#ffffff" stroke="#cfd5df" stroke-width="1.5"/>

  <!-- 모달 헤더 -->
  <rect x="20" y="20" width="660" height="44" rx="6" fill="#2c3550"/>
  <rect x="20" y="48" width="660" height="16" fill="#2c3550"/>
  <text x="42" y="48" font-size="14" font-weight="700" fill="#fff">부동산 거래정보 조회</text>
  <line x1="648" y1="36" x2="660" y2="48" stroke="#cfd5df" stroke-width="1.8"/>
  <line x1="660" y1="36" x2="648" y2="48" stroke="#cfd5df" stroke-width="1.8"/>

