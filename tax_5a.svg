  <text x="42" y="92" font-size="10.5" font-weight="700" fill="#333">검색구분</text>
  <circle cx="150" cy="89" r="6" fill="#fff" stroke="#1d6fd0" stroke-width="1.5"/><circle cx="150" cy="89" r="3" fill="#1d6fd0"/>
  <text x="164" y="92.5" font-size="10" fill="#333">납세자</text>
  <circle cx="240" cy="89" r="6" fill="#fff" stroke="#9aa3b4" stroke-width="1.5"/>
