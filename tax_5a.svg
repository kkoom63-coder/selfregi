  <circle cx="70" cy="300" r="6" fill="#fff" stroke="#1d6fd0" stroke-width="1.5"/><circle cx="70" cy="300" r="3" fill="#1d6fd0"/>
  <text x="130" y="304" text-anchor="middle" font-size="9" fill="#333">매매</text>
  <text x="190" y="304" text-anchor="middle" font-size="9" fill="#333">건물</text>
  <text x="380" y="304" text-anchor="middle" font-size="9" fill="#888" letter-spacing="1">&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;</text>
  <text x="500" y="304" text-anchor="middle" font-size="8.5" fill="#888" letter-spacing="1">&#9679;&#9679;&#9679;&#9679;&#9679;</text>
  <text x="565" y="304" text-anchor="middle" font-size="8.5" fill="#888" letter-spacing="1">&#9679;&#9679;&#9679;&#9679;&#9679;</text>
  <text x="650" y="304" text-anchor="end" font-size="9" fill="#333">300,000,000 원</text>

