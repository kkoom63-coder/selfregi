  <text x="160" y="141" font-size="9.5" fill="#333">경기도</text><text x="328" y="141" font-size="8" fill="#888">&#9660;</text>
  <rect x="350" y="126" width="190" height="22" rx="2" fill="#fff" stroke="#ccd2dc"/>
  <text x="360" y="141" font-size="9.5" fill="#aaa">시·군·구 선택</text><text x="528" y="141" font-size="8" fill="#888">&#9660;</text>

