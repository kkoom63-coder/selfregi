  <line x1="160" y1="260" x2="160" y2="316" stroke="#e2e5ec"/>
  <line x1="220" y1="260" x2="220" y2="316" stroke="#e2e5ec"/>
  <line x1="470" y1="260" x2="470" y2="316" stroke="#e2e5ec"/>
  <line x1="530" y1="260" x2="530" y2="316" stroke="#e2e5ec"/>
  <line x1="600" y1="260" x2="600" y2="316" stroke="#e2e5ec"/>

  <!-- 결과 행 -->
