  <rect x="42" y="394" width="616" height="118" rx="3" fill="#f5f8ff" stroke="#cfe0fb"/>
  <text x="56" y="414" font-size="9.5" font-weight="700" fill="#1d5fb0">신고필증 관리번호 확인 방법</text>
  <text x="56" y="434" font-size="8.7" fill="#444">1. 국토교통부 부동산거래관리시스템(rtms.molit.go.kr)에서 확인 가능</text>
  <text x="56" y="452" font-size="8.7" fill="#444">2. 시·군·구별 거래신고 사이트 &#8594; 바로가기 입력란에 지역을 선택</text>
  <text x="56" y="470" font-size="8.7" fill="#444">3. 회원접속을 합니다</text>
  <text x="56" y="488" font-size="8.7" fill="#444">4. 신고이력조회를 선택합니다</text>

  <!-- 빨간 강조: 검색구분 -->
  <rect x="135" y="80" width="440" height="20" rx="3" fill="none" stroke="#e0392b" stroke-width="2" stroke-dasharray="5 3"/>
  <circle cx="135" cy="80" r="11" fill="#e0392b"/><text x="135" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">1</text>

  <!-- 빨간 강조: 검색버튼 -->
  <rect x="290" y="200" width="120" height="40" rx="3" fill="none" stroke="#e0392b" stroke-width="2" stroke-dasharray="5 3"/>
  <circle cx="290" cy="200" r="11" fill="#e0392b"/><text x="290" y="204" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">2</text>

  <text x="350" y="540" text-anchor="middle" font-size="8.5" fill="#999">(이해를 돕기 위한 재현 이미지)</text>
